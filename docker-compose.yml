version: "3.9"

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HOSTNAME=0.0.0.0
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-moonshotai/kimi-k2:free}
      - OPENROUTER_ENABLE_LIVE_GENERATION=${OPENROUTER_ENABLE_LIVE_GENERATION:-true}
    volumes:
      - server-data:/app/apps/server/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://server:8000
    depends_on:
      - server
    restart: unless-stopped

volumes:
  server-data:
